version: '3'

run: once

vars:
  CONFIGURATION: '{{.CONFIGURATION | default "Debug"}}'
  SOLUTION: src/Documents.slnx
  ARTIFACTS: artifacts

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'

tasks:
  default:
    cmds:
      - task: ci

  clean:
    desc: Remove build outputs and artifacts
    cmds:
      - dotnet clean {{.SOLUTION}}
      - rm -rf {{.ARTIFACTS}}

  build:
    desc: Build the solution (Nerdbank.GitVersioning stamps versions)
    cmds:
      - dotnet build {{.SOLUTION}} --configuration {{.CONFIGURATION}}

  test:
    desc: Run tests with TRX report to artifacts/tests
    deps: [build]
    cmds:
      - >-
        dotnet test src/Allors.Documents.Tests
        --configuration {{.CONFIGURATION}}
        --no-build
        --logger "trx;LogFileName=AllorsDocumentsTests.trx"
        --results-directory {{.ARTIFACTS}}/tests

  pack:
    desc: Create nupkg/snupkg in artifacts/nuget
    deps: [build]
    cmds:
      - >-
        dotnet pack src/Allors.Documents
        --configuration {{.CONFIGURATION}}
        --output {{.ARTIFACTS}}/nuget

  ci:
    desc: Build, test and pack
    cmds:
      - task: test
      - task: pack
