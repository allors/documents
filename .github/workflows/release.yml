name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.0 or v1.2.0-alpha.1). Must already exist.'
        required: true

permissions:
  # Required to create the GitHub Release
  contents: write
  # Required for nuget.org trusted publishing (OIDC)
  id-token: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'

jobs:
  release:
    runs-on: ubuntu-latest
    environment: nuget-release
    steps:
      - uses: actions/checkout@v6
        with:
          # Nerdbank.GitVersioning needs full history to compute the version height
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet build src/Documents.slnx --configuration Release
      - name: Test
        run: >-
          dotnet test src/Allors.Documents.Tests
          --configuration Release
          --no-build
          --logger "trx;LogFileName=AllorsDocumentsTests.trx"
          --results-directory artifacts/tests
      - name: Pack
        run: >-
          dotnet pack src/Allors.Documents
          --configuration Release
          --no-build
          --output artifacts/nuget
      - name: NuGet login (OIDC)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          # nuget.org profile that owns the trusted publishing policy
          user: allors
      - name: Push to nuget.org
        run: dotnet nuget push "artifacts/nuget/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
