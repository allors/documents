name: CI

on:
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          # Nerdbank.GitVersioning needs full history to compute the version height
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ github.token }}
      - name: Build, test and pack
        run: task ci CONFIGURATION=Release
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: artifacts/tests/*.trx
      - uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/nuget/
