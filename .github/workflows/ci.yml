name: CI

on:
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          # Nerdbank.GitVersioning needs full history to compute the version height
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet build src/Documents.slnx --configuration Release
      - name: Test
        run: >-
          dotnet test src/Allors.Documents.Tests
          --configuration Release
          --no-build
          --logger "trx;LogFileName=AllorsDocumentsTests.trx"
          --results-directory artifacts/tests
      - name: Pack
        run: >-
          dotnet pack src/Allors.Documents
          --configuration Release
          --no-build
          --output artifacts/nuget
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: artifacts/tests/*.trx
      - uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/nuget/
